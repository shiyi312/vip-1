<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>手机VIP视频解析器</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f5f7fb; margin: 0; padding: 16px; color: #1e2a3e; }
        .container { max-width: 700px; margin: 0 auto; background: white; border-radius: 28px; box-shadow: 0 8px 28px rgba(0,0,0,0.08); overflow: hidden; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px 20px; color: white; text-align: center; }
        .header h1 { margin: 0; font-size: 1.7rem; font-weight: 600; letter-spacing: -0.3px; }
        .header p { margin: 6px 0 0; opacity: 0.9; font-size: 0.85rem; }
        .group-info { background: #fff3e0; border-left: 5px solid #ff9800; margin: 16px 16px 0; padding: 12px 16px; border-radius: 16px; text-align: center; font-weight: bold; color: #e65100; font-size: 0.9rem; }
        .group-info span { font-size: 1.2rem; background: #ff9800; color: white; padding: 2px 10px; border-radius: 30px; margin-left: 6px; }
        .player-box { padding: 20px 16px 24px; }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; color: #4a5568; }
        .input-group input, .select-group select { width: 100%; padding: 14px 16px; font-size: 1rem; border: 1px solid #e2e8f0; border-radius: 24px; background: white; transition: all 0.2s; -webkit-appearance: none; appearance: none; }
        .input-group input:focus, .select-group select:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.2); }
        .row { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
        .select-group { flex: 1; min-width: 120px; }
        button { width: 100%; background: #667eea; color: white; border: none; padding: 14px; font-size: 1rem; font-weight: 600; border-radius: 40px; cursor: pointer; transition: background 0.2s, transform 0.05s; margin-top: 8px; }
        button:active { background: #5a67d8; transform: scale(0.98); }
        .msg { margin: 16px 0; padding: 10px 14px; border-radius: 20px; font-size: 0.85rem; background: #eef2ff; color: #1e3a8a; text-align: center; }
        .iframe-wrapper { background: black; border-radius: 20px; overflow: hidden; margin-top: 16px; position: relative; aspect-ratio: 16 / 9; }
        iframe { width: 100%; height: 100%; border: none; display: block; }
        .footer { text-align: center; padding: 16px; font-size: 0.7rem; color: #94a3b8; border-top: 1px solid #edf2f7; background: #fafcff; }
        .custom-section { margin-top: 12px; background: #f8fafc; border-radius: 20px; padding: 12px; }
        .flex-btns { display: flex; gap: 10px; margin-top: 8px; }
        .flex-btns button { flex: 1; margin-top: 0; background: #e2e8f0; color: #1e293b; }
        .flex-btns button:active { background: #cbd5e1; }
        @media (max-width: 480px) { body { padding: 12px; } .header h1 { font-size: 1.4rem; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🎬 全网VIP视频解析</h1>
        <p>支持腾讯·爱奇艺·优酷·B站 · 免费4K尝试</p>
    </div>
    <div class="group-info">
        🔥 交流反馈QQ群：<span>808764075</span>
    </div>
    <div class="player-box">
        <div class="input-group">
            <label>📎 视频播放页链接</label>
            <input type="text" id="videoUrl" placeholder="粘贴链接，例如：https://v.qq.com/x/cover/xxx.html">
        </div>
        <div class="row">
            <div class="select-group">
                <label>⚙️ 解析线路</label>
                <select id="apiSelect"></select>
            </div>
            <div class="select-group">
                <label>🎞️ 清晰度尝试</label>
                <select id="qualitySelect">
                    <option value="">自动</option>
                    <option value="&format=hd">高清(720P)</option>
                    <option value="&format=super">超清(1080P)</option>
                    <option value="&format=4k">4K(2160P)</option>
                </select>
            </div>
        </div>
        <button id="playBtn">🚀 立即播放</button>
        <div id="message" class="msg">💡 提示：优先使用「首选推荐」线路，若黑屏请切换其他线路。</div>
        <div class="iframe-wrapper">
            <iframe id="playerIframe" src="about:blank" allowfullscreen="true" allow="fullscreen"></iframe>
        </div>
        <div class="custom-section" id="customSection" style="display: none;">
            <div class="input-group">
                <label>🔧 自定义接口地址</label>
                <input type="text" id="customApiInput" placeholder="https://example.com/?url=">
            </div>
            <div class="flex-btns">
                <button id="setCustomBtn">确认使用</button>
                <button id="hideCustomBtn">取消</button>
            </div>
        </div>
        <div style="text-align: center; margin-top: 12px;">
            <button id="toggleCustomBtn" style="background: none; color: #667eea; box-shadow: none; padding: 8px; font-size: 0.8rem;">➕ 自定义接口</button>
        </div>
    </div>
    <div class="footer">
        ⚠️ 仅供学习交流，接口来自网络。如失效请切换线路或加群反馈。
    </div>
</div>
<script>
    const API_LIST = {
        "🥇 im1907 (首选推荐)": "https://im1907.top/?jx=",
        "🥈 虾米解析 (稳定)": "https://jx.xmflv.com/?url=",
        "🥉 789解析 (推荐)": "https://jiexi.789jiexi.icu:4433/?url=",
        "4. CK解析 (稳定)": "https://www.ckplayer.vip/jiexi/?url=",
        "5. 盘古解析 (备用)": "https://www.pangujiexi.com/jiexi/?url=",
        "6. json.fongmi (优质)": "https://json.fongmi.cc/web?url=",
        "7. HLS解析 (一般)": "https://jx.hls.one/?url=",
        "8. 极速解析 (一般)": "https://jx.2s0.cn/player/?url=",
    };
    const apiSelect = document.getElementById('apiSelect');
    for (const [name, url] of Object.entries(API_LIST)) {
        const option = document.createElement('option');
        option.value = url;
        option.textContent = name;
        apiSelect.appendChild(option);
    }
    const customOption = document.createElement('option');
    customOption.value = 'CUSTOM';
    customOption.textContent = '✨ 自定义接口';
    apiSelect.appendChild(customOption);
    let currentApiBase = apiSelect.value;
    const videoUrlInput = document.getElementById('videoUrl');
    const qualitySelect = document.getElementById('qualitySelect');
    const playBtn = document.getElementById('playBtn');
    const playerIframe = document.getElementById('playerIframe');
    const messageDiv = document.getElementById('message');
    const customSection = document.getElementById('customSection');
    const toggleCustomBtn = document.getElementById('toggleCustomBtn');
    const setCustomBtn = document.getElementById('setCustomBtn');
    const hideCustomBtn = document.getElementById('hideCustomBtn');
    const customApiInput = document.getElementById('customApiInput');
    toggleCustomBtn.addEventListener('click', () => { customSection.style.display = customSection.style.display === 'none' ? 'block' : 'none'; });
    setCustomBtn.addEventListener('click', () => {
        let customUrl = customApiInput.value.trim();
        if (customUrl === '') { alert('请输入有效的接口地址'); return; }
        currentApiBase = customUrl;
        apiSelect.value = 'CUSTOM';
        customSection.style.display = 'none';
        messageDiv.innerHTML = '✅ 已设置自定义接口: ' + customUrl;
    });
    hideCustomBtn.addEventListener('click', () => {
        customSection.style.display = 'none';
        if (apiSelect.value === 'CUSTOM') {
            for (let i = 0; i < apiSelect.options.length; i++) {
                if (apiSelect.options[i].value !== 'CUSTOM') {
                    apiSelect.value = apiSelect.options[i].value;
                    currentApiBase = apiSelect.value;
                    break;
                }
            }
        } else { currentApiBase = apiSelect.value; }
    });
    apiSelect.addEventListener('change', () => {
        if (apiSelect.value === 'CUSTOM') { customSection.style.display = 'block'; }
        else { customSection.style.display = 'none'; currentApiBase = apiSelect.value; }
    });
    function playVideo() {
        let videoUrl = videoUrlInput.value.trim();
        if (!videoUrl) { alert('请先粘贴视频链接'); return; }
        let quality = qualitySelect.value;
        let apiBase = currentApiBase;
        if (apiBase === 'CUSTOM') {
            let customUrl = customApiInput.value.trim();
            if (customUrl === '') { alert('请先设置自定义接口'); return; }
            apiBase = customUrl;
        }
        let finalUrl = apiBase + encodeURIComponent(videoUrl) + quality;
        playerIframe.src = finalUrl;
        messageDiv.innerHTML = '⏳ 正在加载解析，请稍候... 若长时间黑屏请切换线路或清晰度。';
        playerIframe.onload = () => { messageDiv.innerHTML = '✅ 播放器已加载，点击视频窗口内可全屏，可尝试切换清晰度。'; };
        playerIframe.onerror = () => { messageDiv.innerHTML = '❌ 加载失败，请检查网络或更换解析线路。'; };
    }
    playBtn.addEventListener('click', playVideo);
    videoUrlInput.addEventListener('focus', () => { setTimeout(() => window.scrollTo(0, 0), 300); });
    if (navigator.userAgent.match(/Mobile|Android|iPhone|iPad|iPod/i)) {
        messageDiv.innerHTML = '📱 在视频App内点击“分享”->“复制链接”，然后粘贴到上方输入框。优先使用推荐线路。';
    }
</script>
</body>
</html>
